name: NodeJS with Webpack + Auto Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Git
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npx webpack

    # ✅ 빌드 결과물을 VibeCheck 폴더로 이동
    - name: Move build to VibeCheck folder
      run: |
        mkdir -p VibeCheck
        cp -r dist/* VibeCheck/

    # ✅ 버전 자동 증가
    - name: Bump version
      run: |
        npm version patch -m "chore: bump version to %s"

    # ✅ 변경사항 + 태그 푸시
    - name: Push changes and tags
      run: |
        git push
        git push --tags

    # ✅ Release 생성 + VibeCheck 폴더 업로드
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: |
          VibeCheck/**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
