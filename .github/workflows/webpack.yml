name: NodeJS Build & Auto Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ 코드 체크아웃
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Git 설정 (버전 커밋용)
    - name: Setup Git
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

    # 3️⃣ Node 설치
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    # 4️⃣ 의존성 설치
    - name: Install dependencies
      run: npm install

    # 5️⃣ 웹팩 빌드
    - name: Build with Webpack
      run: npx webpack

    # 6️⃣ 빌드 결과물을 VibeCheck 폴더로 이동
    - name: Move build to VibeCheck folder
      run: |
        rm -rf VibeCheck
        mkdir VibeCheck
        cp -r dist/* VibeCheck/

    # 7️⃣ VibeCheck.zip 생성
    - name: Zip build
      run: |
        cd VibeCheck
        zip -r ../VibeCheck.zip .

    # 8️⃣ 버전 자동 증가 (patch)
    - name: Bump version
      run: |
        npm version patch -m "chore: bump version to %s"

    # 9️⃣ 변경사항 + 태그 푸시
    - name: Push changes and tags
      run: |
        git push
        git push --tags

    # 🔟 GitHub Release 생성 + ZIP 업로드
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: 🚀 VibeCheck v${{ github.ref_name }}
        files: VibeCheck.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
